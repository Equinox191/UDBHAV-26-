<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Career Suggest · Aarambh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: hsl(36 30% 96%);
  --fg: hsl(220 35% 12%);
  --surface: hsl(36 25% 93%);
  --surface-elev: #ffffff;
  --card: #ffffff;
  --primary: hsl(220 40% 16%);
  --primary-fg: hsl(36 30% 96%);
  --muted: hsl(36 18% 91%);
  --muted-fg: hsl(220 12% 40%);
  --border: hsl(36 18% 84%);
  --accent: hsl(18 65% 42%);
  --disha: hsl(340 55% 38%);
  --gradient-disha: linear-gradient(135deg, hsl(340 55% 38%), hsl(340 55% 48%));
  --shadow-card: 0 1px 2px hsl(220 30% 14% / 0.04), 0 2px 12px -6px hsl(220 30% 14% / 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(ellipse 90% 50% at 100% 0%, hsl(18 65% 42% / 0.05), transparent 60%),
    radial-gradient(ellipse 60% 40% at 0% 100%, hsl(200 50% 30% / 0.04), transparent 60%);
  background-attachment: fixed;
  line-height: 1.5;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; background: none; border: none; color: inherit; }
h1, h2, h3 { font-family: 'Fraunces', Georgia, serif; letter-spacing: -0.015em; font-weight: 500; }

/* Page layout */
.page-wrap { max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; }
.step-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted-fg); text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 12px; }
.page-title { font-size: clamp(28px, 5vw, 40px); font-weight: 600; line-height: 1.15; margin-bottom: 10px; }
.page-title em.disha { font-style: italic; color: var(--disha); }
.page-subtitle { font-size: 15px; color: var(--muted-fg); margin-bottom: 36px; }

/* Dual grid */
.dual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 36px; }
@media(max-width:700px){ .dual-grid { grid-template-columns: 1fr; } }

.choice-card {
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 16px;
  padding: 20px 22px;
}
.mono-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--muted-fg);
  margin-bottom: 12px;
}
.choice-row { display: flex; flex-wrap: wrap; gap: 8px; }
.choice-pill {
  padding: 7px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg);
  font-size: 13px;
  font-weight: 500;
  color: var(--muted-fg);
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s, transform 0.1s;
}
.choice-pill:hover { color: var(--fg); border-color: var(--disha); transform: translateY(-1px); }
.choice-pill.active { background: var(--disha); color: white; border-color: var(--disha); }

/* Recs header */
.recs-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 8px;
}
.recs-head h2 { font-size: 22px; font-weight: 700; }
.recs-head .tag-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted-fg);
  letter-spacing: 0.08em;
  background: var(--muted);
  padding: 4px 10px;
  border-radius: 8px;
  transition: all 0.3s;
}

/* Rec grid */
.rec-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
@media(max-width:700px){ .rec-grid { grid-template-columns: 1fr; } }
@media(max-width:900px) and (min-width:701px){ .rec-grid { grid-template-columns: 1fr 1fr; } }

.rec-card {
  border: 1px solid var(--border);
  background: var(--surface-elev);
  border-radius: 16px;
  padding: 20px;
  transition: border-color 0.2s, box-shadow 0.2s, opacity 0.3s, transform 0.3s;
  box-shadow: var(--shadow-card);
  display: flex;
  flex-direction: column;
  gap: 0;
}
.rec-card:hover { border-color: var(--disha); box-shadow: 0 4px 24px -8px hsl(340 55% 38% / 0.18); }
.rec-card.exiting { opacity: 0; transform: translateY(8px); }
.rec-card.entering { animation: cardIn 0.3s ease forwards; }
@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.briefcase { font-size: 22px; margin-bottom: 14px; }
.rec-card h3 { font-size: 17px; font-weight: 600; margin-bottom: 3px; }
.rec-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--muted-fg);
  margin-bottom: 14px;
}
.rec-match { margin-bottom: 14px; }
.rec-match .top {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-bottom: 5px;
}
.rec-match .top .muted { color: var(--muted-fg); }
.rec-match .top span:last-child { color: var(--disha); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.bar { height: 4px; background: var(--muted); border-radius: 99px; overflow: hidden; }
.bar div { height: 100%; background: var(--gradient-disha); border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

.skill-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; flex: 1; }
.chip {
  padding: 3px 9px;
  border-radius: 8px;
  background: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: var(--muted-fg);
  letter-spacing: 0.04em;
}
.rec-card a {
  color: var(--disha);
  font-weight: 600;
  font-size: 13px;
  margin-top: auto;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: gap 0.15s;
}
.rec-card a:hover { gap: 8px; }

/* AI Explain button */
.ai-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 12px;
  color: var(--muted-fg);
  cursor: pointer;
  font-weight: 500;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.ai-btn:hover { border-color: var(--disha); color: var(--disha); background: hsl(340 55% 38% / 0.06); }
.ai-btn svg { width: 13px; height: 13px; }

/* AI explanation panel */
.ai-panel {
  margin-top: 10px;
  padding: 12px 14px;
  background: hsl(340 55% 38% / 0.06);
  border: 1px solid hsl(340 55% 38% / 0.2);
  border-radius: 10px;
  font-size: 13px;
  color: var(--fg);
  line-height: 1.55;
  display: none;
}
.ai-panel.visible { display: block; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.ai-panel .ai-loading { color: var(--muted-fg); font-style: italic; font-size: 12px; }

/* Loading skeleton */
.skeleton-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
@media(max-width:700px){ .skeleton-grid { grid-template-columns: 1fr; } }
.skeleton-card {
  border: 1px solid var(--border);
  background: var(--surface-elev);
  border-radius: 16px;
  padding: 20px;
  animation: pulse 1.4s ease-in-out infinite;
}
.skel { background: var(--muted); border-radius: 6px; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted-fg);
}
.empty-state h3 { font-family: 'Fraunces', serif; font-size: 20px; margin-bottom: 8px; color: var(--fg); }
.empty-state p { font-size: 14px; }
</style>
</head>

// ─── State ────────────────────────────────────────────────────────────────────
let selectedInterest = "Web";
let selectedLevel    = "Beginner";
const aiPanelStates  = {}; // track open ai panels

// ─── Init ─────────────────────────────────────────────────────────────────────
function init() {
  bindPills("interest-pills", v => { selectedInterest = v; updateRecs(); });
  bindPills("level-pills",    v => { selectedLevel    = v; updateRecs(); });
  renderRecs();
}

function bindPills(containerId, onChange) {
  const container = document.getElementById(containerId);
  container.querySelectorAll(".choice-pill").forEach(pill => {
    pill.addEventListener("click", () => {
      container.querySelectorAll(".choice-pill").forEach(p => p.classList.remove("active"));
      pill.classList.add("active");
      onChange(pill.dataset.value);
    });
  });
}

function updateRecs() {
  document.getElementById("active-tag").textContent = `${selectedInterest} · ${selectedLevel}`;
  renderRecs();
}

function renderRecs() {
  const container = document.getElementById("rec-container");
  const cards = DATA[selectedInterest]?.[selectedLevel] || [];

  // Fade out
  container.style.opacity = "0";
  container.style.transform = "translateY(6px)";
  container.style.transition = "opacity 0.2s, transform 0.2s";

  setTimeout(() => {
    if (cards.length === 0) {
      container.innerHTML = `<div class="empty-state">
        <h3>No matches yet</h3>
        <p>Try a different combination of interest and skill level.</p>
      </div>`;
    } else {
      container.innerHTML = `<div class="rec-grid">${cards.map((c, i) => cardHTML(c, i)).join("")}</div>`;
      // bind AI buttons
      container.querySelectorAll(".ai-btn").forEach(btn => {
        btn.addEventListener("click", () => handleAI(btn));
      });
    }
    container.style.opacity = "1";
    container.style.transform = "translateY(0)";
  }, 180);
}

function cardHTML(card, idx) {
  const delay = idx * 60;
  return `
  <div class="rec-card entering" style="animation-delay:${delay}ms">
    <div class="briefcase">${card.icon}</div>
    <h3>${card.title}</h3>
    <div class="rec-meta">${card.salary}</div>
    <div class="rec-match">
      <div class="top"><span class="muted">match</span><span>${card.match}%</span></div>
      <div class="bar"><div style="width:${card.match}%"></div></div>
    </div>
    <div class="skill-tags">${card.tags.map(t => `<span class="chip">${t}</span>`).join("")}</div>
    <a href="path.html?career=${card.career}">Build path →</a>
    <button class="ai-btn" data-title="${card.title}" data-interest="${selectedInterest}" data-level="${selectedLevel}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm3 7l-4 8-4-4 8-4z"/></svg>
      Why this role?
    </button>
    <div class="ai-panel" id="panel-${idx}"></div>
  </div>`;
}

// ─── AI explain ───────────────────────────────────────────────────────────────
async function handleAI(btn) {
  const panelId = btn.nextElementSibling.id;
  const panel   = document.getElementById(panelId);
  const isOpen  = panel.classList.contains("visible");

  // Toggle close
  if (isOpen) {
    panel.classList.remove("visible");
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm3 7l-4 8-4-4 8-4z"/></svg> Why this role?`;
    return;
  }

  const title    = btn.dataset.title;
  const interest = btn.dataset.interest;
  const level    = btn.dataset.level;

  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm3 7l-4 8-4-4 8-4z"/></svg> Loading…`;
  btn.disabled  = true;

  panel.innerHTML = `<span class="ai-loading">Thinking...</span>`;
  panel.classList.add("visible");

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `You are a friendly career coach for Indian tech students. In 2-3 short sentences (max 60 words total), explain WHY "${title}" is a great match for someone interested in "${interest}" at a "${level}" skill level. Be specific, encouraging, and mention one concrete first step. No bullet points. Plain conversational text only.`
        }]
      })
    });

    const data   = await res.json();
    const text   = data?.content?.[0]?.text || "Couldn't load explanation — try again!";
    panel.textContent = text;
  } catch(e) {
    panel.textContent = "Couldn't reach the AI right now. You've got great taste in roles though! 🚀";
  }

  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm3 7l-4 8-4-4 8-4z"/></svg> Hide`;
  btn.disabled  = false;
}

init();
</script>
</body>
</html>
